<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" fill="none">
  <defs>
    <style>
      .bg { fill: #ffffff; }
      @media (prefers-color-scheme: dark) { .bg { fill: #111827; } }
    </style>
    <linearGradient id="ig" x1="56" y1="18" x2="36" y2="82" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#1E40AF"/>
      <stop offset="45%" stop-color="#2563EB"/>
      <stop offset="100%" stop-color="#06D6B0"/>
    </linearGradient>
    <linearGradient id="ifold" x1="65" y1="38" x2="50" y2="50" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="white" stop-opacity="0.3"/>
      <stop offset="100%" stop-color="white" stop-opacity="0"/>
    </linearGradient>
  </defs>

  <!-- Rounded square background (dark/light adaptive) -->
  <rect width="100" height="100" rx="20" class="bg"/>

  <!-- S mark scaled to fit with padding inside the square -->
  <g transform="translate(12 12) scale(0.76)">
    <path
      d="M 65 20 C 90 5, 90 50, 50 52 C 10 54, 10 90, 35 88"
      stroke="url(#ig)"
      stroke-width="22"
      stroke-linecap="round"
      fill="none"
    />
    <path
      d="M 65 36 C 82 44, 75 52, 50 52"
      stroke="url(#ifold)"
      stroke-width="11"
      stroke-linecap="round"
      fill="none"
    />
  </g>
</svg>
